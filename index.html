<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Gestión de Planta CPRII</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
</head>
<body>

<header><h1>Análisis Gestión de Planta CPRII</h1></header>

<div class="controls-bar">
    <div style="display: flex; align-items: center; gap: 10px;">
        <strong>Archivo(s):</strong>
        <button onclick="login()" class="date-filter" style="background: #f8f9fa; border-color: #ccc; color: #333;">Elegir archivos</button>
        <span style="color: var(--success); font-weight: bold;">✅ Datos cargados.</span>
    </div>

    <div style="display: flex; gap: 15px; align-items: center;">
        <strong>Filtrar:</strong>
        <select id="sel-anio" class="date-filter" onchange="actualizarMeses()"><option value="ALL">AÑO (TODOS)</option></select>
        <select id="sel-mes" class="date-filter" onchange="actualizarDias()"><option value="ALL">MES (TODOS)</option></select>
        <select id="sel-dia" class="date-filter" onchange="aplicarFiltro()"><option value="ALL">DÍA (TODOS)</option></select>
    </div>

    <button class="btn-reset" onclick="resetearDatos()">🗑️ Limpiar Todo</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('tab-directorio')">🚀 DASHBOARD INTERACTIVO</button>
    <button class="tab-btn" onclick="showTab('tab-memoria')">📊 MEMORIA DE CÁLCULO</button>
    <button class="tab-btn" onclick="showTab('tab-tabla')">📋 TABLA ACUMULADA</button>
</div>

<div class="container">
    <div id="tab-directorio" class="content active">
        <div class="kpi-main">
            <h3>OEE GLOBAL ACUMULADO</h3>
            <div id="dir-oee" class="value">0%</div>
        </div>

        <div style="color: #666; font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase;">OEE POR TURNO</div>
        <div class="grid-kpis">
            <div class="card" style="border-top: 4px solid var(--m);"><h3>MAÑANA</h3><div id="oee-m" class="value">0%</div></div>
            <div class="card" style="border-top: 4px solid var(--t);"><h3>TARDE</h3><div id="oee-t" class="value">0%</div></div>
            <div class="card" style="border-top: 4px solid var(--n);"><h3>NOCHE</h3><div id="oee-n" class="value">0%</div></div>
        </div>

        <div id="grid-ceco-kpis" class="grid-kpis"></div>
        <div id="grafico-ceco-oee" style="margin-bottom: 20px;"></div>
        <div id="contenedor-acordeon"></div>
    </div>

    <div id="tab-memoria" class="content">
        <table>
            <thead>
                <tr><th>Fecha</th><th>OT</th><th>Turno</th><th>Ctro. Costo</th><th>Nominal</th><th>Producido</th><th style="background:#e0f2fe">OEE %</th><th style="background:#fff9e6">GE %</th></tr>
            </thead>
            <tbody id="body-memoria"></tbody>
        </table>
    </div>

    <div id="tab-tabla" class="content">
        <div id="out-tabla"></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
